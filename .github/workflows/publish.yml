name: Release & Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
      has_changes: ${{ steps.version.outputs.has_changes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Detect version changes
        id: version
        run: |
          git fetch --tags
          
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          CURRENT_VERSION=${LAST_TAG#v}
          
          COMMITS_COUNT=$(git rev-list --count ${LAST_TAG}..HEAD 2>/dev/null || echo "0")
          
          echo "Current version: $CURRENT_VERSION"
          echo "Commits since last tag: $COMMITS_COUNT"
          
          BUMP_TYPE="patch"
          if [ "$COMMITS_COUNT" -gt 0 ]; then
            COMMIT_MSG=$(git log -1 --format:%s)
            if echo "$COMMIT_MSG" | grep -qiE "^(feat|fix|perf|refactor|depr)"; then
              BUMP_TYPE="minor"
            fi
            if echo "$COMMIT_MSG" | grep -qiE "break"; then
              BUMP_TYPE="major"
            fi
          fi
          
          echo "Bump type: $BUMP_TYPE"
          
          IFS='.' read -ra VERSION_PARTS <<< "$CURRENT_VERSION"
          MAJOR=${VERSION_PARTS[0]:-0}
          MINOR=${VERSION_PARTS[1]:-0}
          PATCH=${VERSION_PARTS[2]:-0}
          
          case $BUMP_TYPE in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac
          
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "New version: $NEW_VERSION"
          
          HAS_CHANGES="true"
          if [ "$CURRENT_VERSION" = "$NEW_VERSION" ]; then
            HAS_CHANGES="false"
          fi
          
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "has_changes=$HAS_CHANGES" >> $GITHUB_OUTPUT

      - name: Update package.json version
        if: steps.version.outputs.has_changes == 'true'
        run: |
          npm version ${{ steps.version.outputs.new_version }} --no-git-tag-version

      - name: Commit version bump
        if: steps.version.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add package.json
          git commit -m "chore: bump version to v${{ steps.version.outputs.new_version }}"

  publish:
    needs: release
    if: needs.release.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Update version
        run: |
          npm version ${{ needs.release.outputs.new_version }} --no-git-tag-version

      - name: Build
        run: npm pack --dry-run

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ needs.release.outputs.new_version }}
          release_name: Release v${{ needs.release.outputs.new_version }}
          draft: false
          prerelease: false
